<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Wavex">
  <defs>
    <linearGradient id="ig-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6ee7f7"/>
      <stop offset="52%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="ig-wave" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6ee7f7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="ig-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6ee7f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="ig-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ig-glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ig-clip"><rect x="2" y="2" width="76" height="76" rx="18"/></clipPath>
  </defs>

  <rect x="1"  y="1"  width="78" height="78" rx="19" fill="none" stroke="url(#ig-main)" stroke-width="1.5" opacity="0.65"/>
  <rect x="2"  y="2"  width="76" height="76" rx="18" fill="url(#ig-fill)"/>
  <rect x="2"  y="2"  width="76" height="76" rx="18" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.8"/>

  <g clip-path="url(#ig-clip)">
    <path d="M6 55 Q16 40 26 52 Q36 65 46 50 Q56 35 66 48 Q70 52 74 55"
          fill="none" stroke="url(#ig-wave)" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
    <path d="M6 47 Q16 31 26 44 Q36 58 46 42 Q56 27 66 40 Q70 44 74 47"
          fill="none" stroke="url(#ig-wave)" stroke-width="3" stroke-linecap="round" opacity="0.52" filter="url(#ig-glow)"/>
    <path d="M6 39 Q16 21 26 35 Q36 50 46 33 Q56 17 66 31 Q70 35 74 39"
          fill="none" stroke="url(#ig-main)" stroke-width="4" stroke-linecap="round" filter="url(#ig-glow2)"/>
  </g>

  <ellipse cx="21" cy="16" rx="15" ry="6.5" fill="rgba(255,255,255,0.08)" transform="rotate(-18 21 16)"/>
</svg>
